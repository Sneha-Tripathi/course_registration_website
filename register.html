<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Registration - Register</title>
  <style>
    /* General Page Style */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
       background: url("back.png") no-repeat center center/cover; /* Soft Blue Gradient */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    /* Container */
    .register-container {
      background:url("Screenshot (85).png") no-repeat center center/cover; /* Clean white form */
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      width: 400px;
      animation: fadeIn 1s ease-in-out;
    }

    /* Heading */
    .register-container h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #2e5aac; /* Deep education blue */
      font-size: 26px;
      font-weight: bold;
    }

    /* Form Groups */
    .form-group {
      margin-bottom: 18px;
    }

    /* Labels */
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: #333;
    }

    /* Inputs & Select */
    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 15px;
      transition: 0.3s;
      background: #f9f9f9;
    }

    input:focus, select:focus {
      border-color: #2e5aac;
      outline: none;
      box-shadow: 0 0 6px rgba(46,90,172,0.4);
      background: #fff;
    }

    /* Button */
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #4a90e2, #357abd);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, background 0.3s ease;
    }

    .btn:hover {
      transform: scale(1.03);
      background: linear-gradient(135deg, #357abd, #285a8e);
    }

    /* Animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="register-container">
    <h2>Register for Courses</h2>
    <form action="#" method="post" class="register-form">

      <div class="form-group">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" required>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="studentid">Student ID</label>
        <input type="text" id="studentid" name="studentid" required>
      </div>

      <div class="form-group">
        <label for="department">Department</label>
        <select id="department" name="department" required>
          <option value="">-- Select Department --</option>
          <option value="cse">Computer Science</option>
          <option value="ece">Electronics</option>
          <option value="mech">Mechanical</option>
          <option value="civil">Civil</option>
        </select>
      </div>

      <div class="form-group">
        <label for="password">Create Password</label>
        <input type="password" id="password" name="password" required>
      </div>

      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" name="confirm" required>
      </div>

      <button type="submit" class="btn">Register</button>
    </form>
  </div>
</body>
</html>

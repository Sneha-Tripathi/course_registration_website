<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Registration - Login</title>
  <style>
    /* General Page Style */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: url("bakkk.png") no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      position: relative;
    }

    /* Overlay */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5); /* dark overlay for readability */
      z-index: 0;
    }

    /* Login Container */
    .login-container {
      position: relative;
      z-index: 1;
      background:url("Screenshot (85).png") no-repeat center center/cover;
      padding: 35px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      width: 380px;
      animation: fadeIn 1s ease-in-out;
      text-align: center;
    }

    /* Heading */
    .login-container h2 {
      margin-bottom: 20px;
      font-size: 28px;
      font-weight: bold;
      color: #2c3e50;
    }

    /* Inputs */
    .form-group {
      margin-bottom: 18px;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: #333;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 15px;
      transition: 0.3s;
      background: #f9f9f9;
    }

    input:focus {
      border-color: #0e0f0f;
      outline: none;
      box-shadow: 0 0 6px rgba(10, 10, 10, 0.5);
      background: #fff;
    }

    /* Button */
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #030303, #121213);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, background 0.3s ease;
    }

    .btn:hover {
      transform: scale(1.05);
      background: linear-gradient(135deg, #0a0a0a, #0d0d0e);
    }

    /* Extra Links */
    .extra-links {
      margin-top: 15px;
      font-size: 14px;
    }

    .extra-links a {
      color: #2980b9;
      text-decoration: none;
      font-weight: 600;
    }

    .extra-links a:hover {
      text-decoration: underline;
    }

    /* Animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Student Login</h2>
    <form action="#" method="post" class="login-form">

      <div class="form-group">
        <label for="studentid">Student ID / Email</label>
        <input type="text" id="studentid" name="studentid" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>

      <button type="submit" class="btn">Login</button>

      <div class="extra-links">
        <p>Don’t have an account? <a href="register.html">Register here</a></p>
        <p><a href="#">Forgot Password?</a></p>
      </div>
    </form>
  </div>
</body>
</html>

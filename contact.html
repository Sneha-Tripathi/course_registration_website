<!-- Contact Us Section -->
<section id="contact" style="padding:40px 20px; background:url('bakkk.png')no-repeat center center/cover; text-align:center;">
  <div style="max-width:900px; margin:auto;">
    <h2 style="font-size:28px; margin-bottom:20px; color:#333;">Contact Us</h2>
    <p style="margin-bottom:30px; color:#555;">Have any questions? Feel free to reach out to us. We’ll get back to you soon!</p>
    
    <div style="display:flex; flex-wrap:wrap; gap:20px; justify-content:center;">
      
      <!-- Left: Contact Form -->
      <div style="flex:1; min-width:280px; background:url('Screenshot (85).png')no-repeat center center/cover; padding:20px; border-radius:8px; box-shadow:0 4px 10px rgba(0,0,0,0.1);">
        <form>
          <label for="name" style="display:block; text-align:left; margin-bottom:5px;">Full Name</label>
          <input type="text" id="name" placeholder="Enter your full name" required 
                 style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:5px;">
          
          <label for="email" style="display:block; text-align:left; margin-bottom:5px;">Email</label>
          <input type="email" id="email" placeholder="Enter your email" required 
                 style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:5px;">
          
          <label for="message" style="display:block; text-align:left; margin-bottom:5px;">Message</label>
          <textarea id="message" rows="4" placeholder="Enter your message" required 
                    style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:5px;"></textarea>
          
          <button type="submit" style="background:#2c6e91; color:#e4d8d8; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">Send Message</button>
        </form>
      </div>

      <!-- Right: Contact Info -->
      <div style="flex:1; min-width:280px; background:url('Screenshot (85).png')no-repeat center center/cover; padding:20px; border-radius:8px; box-shadow:0 4px 10px rgba(0,0,0,0.1); text-align:left;">
        <h3 style="margin-bottom:15px; color:#333;">Get in Touch</h3>
        <p><strong>Email:</strong> info@yourwebsite.com</p>
        <p><strong>Phone:</strong> +91 98765 43210</p>
        <p><strong>Address:</strong> 123, Your Street, Your City, India</p>
      </div>
      
    </div>
  </div>
</section>
